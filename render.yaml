services:
  # Backend API
  - type: web
    name: telora-backend
    env: python
    region: frankfurt
    branch: master
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: CORS_ORIGINS
        value: "https://telora-app.expo.dev,exp://localhost:8081,http://localhost:8081,http://localhost:5173"
    healthCheckPath: /health
    autoDeploy: true
